# ============================================================
# llapi.merrydance.cn - 新服务器本地后端配置
# 流量走向: Nginx(443) -> 本机应用(127.0.0.1:8080)
# ============================================================

upstream llapi_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name llapi.merrydance.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name llapi.merrydance.cn;

    ssl_certificate /etc/letsencrypt/live/llapi.merrydance.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llapi.merrydance.cn/privkey.pem;
    include /etc/nginx/conf.d/snippets/ssl-params.conf;

    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    client_max_body_size 50M;
    client_body_timeout 60s;

    include /etc/nginx/conf.d/snippets/security-headers.conf;
    include /etc/nginx/conf.d/snippets/security-rules.conf;

    access_log /var/log/nginx/llapi.access.log main;
    error_log /var/log/nginx/llapi.error.log warn;
    limit_conn conn_per_ip 100;

    location ~ /ws$ {
        include /etc/nginx/conf.d/snippets/proxy-params.conf;
        proxy_pass http://llapi_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 3600s;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"code":502,"message":"backend unavailable","data":null}';
    }

    location / {
        # 如需更严格限流，可启用下行配置。
        # limit_req zone=api burst=150 nodelay;

        include /etc/nginx/conf.d/snippets/proxy-params.conf;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://llapi_backend;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
