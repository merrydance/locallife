groups:
  - name: database
    rules:
      - alert: DBConnectionPoolHighUtilization
        expr: db_connections_active > 0 and (db_connections_active / (db_connections_active + db_connections_idle) > 0.8)
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "DB connection pool utilization high"
          description: "Active DB connections exceed 80% of total pooled connections for 5 minutes."

      - alert: DBConnectionPoolExhausted
        expr: db_connections_active > 0 and db_connections_idle == 0
        for: 5m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "DB connection pool exhausted"
          description: "No idle DB connections for 5 minutes. Requests may start blocking."

  - name: redis
    rules:
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage > 80% for 5 minutes."

      - alert: RedisMemoryCritical
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: critical
          category: cache
        annotations:
          summary: "Redis memory usage critical"
          description: "Redis memory usage > 90% for 5 minutes."

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients / redis_maxclients > 0.8
        for: 5m
        labels:
          severity: warning
          category: cache
        annotations:
          summary: "Redis client connections high"
          description: "Redis connected clients exceed 80% of maxclients for 5 minutes."

  - name: queue
    rules:
      - alert: AsynqQueueBacklogHigh
        expr: sum(asynq_queue_size) > 1000
        for: 10m
        labels:
          severity: warning
          category: queue
        annotations:
          summary: "Asynq queue backlog high"
          description: "Queue size exceeds 1000 for 10 minutes."

      - alert: AsynqQueueFailuresHigh
        expr: rate(asynq_task_failures_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
          category: queue
        annotations:
          summary: "Asynq task failures high"
          description: "Task failure rate > 0.1/s for 10 minutes."
