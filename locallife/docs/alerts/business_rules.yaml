groups:
  - name: order-status
    rules:
      - alert: OrderStatusAnomalyDetected
        expr: increase(order_status_anomalies_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          category: order
        annotations:
          summary: "Order status anomaly detected"
          description: "Order status anomalies detected in the last 10 minutes. Requires order_status_anomalies_total metric."

  - name: delivery
    rules:
      - alert: DeliveryTimeoutsHigh
        expr: increase(delivery_timeouts_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          category: delivery
        annotations:
          summary: "Delivery timeouts detected"
          description: "Delivery timeouts detected in the last 10 minutes. Requires delivery_timeouts_total metric."

  - name: kds
    rules:
      - alert: KDSTimeoutsHigh
        expr: increase(kds_timeouts_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          category: kitchen
        annotations:
          summary: "KDS timeouts detected"
          description: "KDS timeout events detected in the last 10 minutes. Requires kds_timeouts_total metric."

  - name: refund
    rules:
      - alert: RefundPendingTooLong
        expr: refund_pending_overdue_total > 0
        for: 10m
        labels:
          severity: warning
          category: refund
        annotations:
          summary: "Refund pending too long"
          description: "Refunds pending beyond SLA detected. Requires refund_pending_overdue_total metric."
