groups:
  - name: payment-callbacks
    rules:
      - alert: PaymentCallbackFailuresDetected
        expr: sum by (type) (increase(payment_callback_failures_total{type=~"payment|refund|profit_sharing"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
          category: payment
        annotations:
          summary: "Payment callback failures detected ({{ $labels.type }})"
          description: "Payment callback failures observed in the last 5 minutes. Investigate callback handler logs and WeChat gateway status."

      - alert: PaymentCallbackFailuresSpike
        expr: sum by (type) (increase(payment_callback_failures_total{type=~"payment|refund|profit_sharing"}[5m])) >= 5
        for: 5m
        labels:
          severity: critical
          category: payment
        annotations:
          summary: "Payment callback failures spike ({{ $labels.type }})"
          description: "5 or more callback failures within 5 minutes. Immediate investigation required."
