        - pending: 待支付
        - paid: 已支付
        - preparing: 制作中
        - ready: 待代取/待取餐
        - courier_accepted: 骑手已接单
        - picked: 已取餐
        - delivering: 代取中
        - rider_delivered: 骑手送达
        - user_delivered: 用户确认送达
