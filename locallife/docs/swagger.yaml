            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 该索赔不属于当前用户
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 索赔不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: 当前赔付不需要微信确认收款
          schema:
