        为订单或预定创建支付订单，当前主路径会按业务类型自动选择真实支付链路。

        `payment_type` 为兼容字段，可不传；当前 `order` 和 `reservation` 主支付统一走宝付聚合支付；直连微信仅用于押金、追偿和补偿等保留场景。

        **业务类型：**
        - order: 订单支付
        - reservation: 预定押金

        **幂等性：** 如果已存在待支付的支付订单，将直接返回该订单。

        **安全限制：**
        - 订单必须属于当前用户
        - 订单必须处于pending状态
