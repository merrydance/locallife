  /v1/orders:
    get:
      consumes:
      - application/json
      description: |-
        分页获取当前用户的订单列表，支持按状态筛选。

        **订单状态枚举：**
        - pending: 待支付
        - paid: 已支付
        - preparing: 制作中
        - ready: 待代取/待取餐
        - courier_accepted: 骑手已接单
        - picked: 已取餐
        - delivering: 代取中
        - rider_delivered: 骑手送达
        - user_delivered: 用户确认送达
        - completed: 已完成
        - cancelled: 已取消
      parameters:
      - description: 页码(从1开始)
        in: query
        minimum: 1
        name: page_id
        required: true
        type: integer
      - description: 每页条数
        in: query
        maximum: 20
        minimum: 5
        name: page_size
        required: true
        type: integer
      - description: 订单状态筛选
        enum:
        - pending
        - paid
        - preparing
        - ready
        - courier_accepted
        - picked
        - delivering
        - rider_delivered
        - user_delivered
        - completed
        - cancelled
        in: query
        name: status
        type: string
      - description: 订单类型筛选
        enum:
        - takeout
        - dine_in
        - takeaway
        - reservation
        in: query
        name: order_type
        type: string
      - description: 预订ID筛选（仅预定点菜订单）
        in: query
        minimum: 1
        name: reservation_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 订单列表
          schema:
            $ref: '#/definitions/api.listOrdersResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取订单列表
      tags:
      - 订单管理
    post:
      consumes:
      - application/json
      description: |-
        创建新订单，支持四种类型：外卖(takeout)、堂食(dine_in)、打包自取(takeaway)、预定点菜(reservation)。

        **订单类型与必填字段：**
        - takeout: 必须提供address_id
        - dine_in: 必须提供table_id
        - takeaway: 无额外必填字段
        - reservation: 必须提供reservation_id

        **安全限制：**
        - 外卖订单的地址必须属于当前用户
        - 堂食订单的桌台必须属于指定商户
        - 商户必须处于active状态才能下单
        - 订单中的菜品必须在线且可售
      parameters:
      - description: 可选幂等键，同一次创建订单重试建议复用同一个值
        in: header
        name: Idempotency-Key
        type: string
      - description: 订单创建参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.createOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            $ref: '#/definitions/api.createOrderResponse'
        "400":
          description: 请求参数错误 / 商户未激活 / 菜品下线 / 桌台不属于该商户
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
