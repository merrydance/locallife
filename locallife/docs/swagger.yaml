      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      merchant_id:
        type: integer
      min_order_amount:
        type: integer
      name:
        type: string
      status_code:
        type: string
      status_label:
        type: string
      status_theme:
        type: string
      total_quantity:
        type: integer
      used_quantity:
        type: integer
      valid_from:
        type: string
      valid_until:
        type: string
