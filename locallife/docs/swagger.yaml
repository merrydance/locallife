      produces:
      - application/json
      responses:
        "101":
          description: 协议升级成功
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 仅骑手和商户可连接
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: WebSocket连接端点
      tags:
      - 通知管理
securityDefinitions:
  BearerAuth:
    description: 'Enter the token with the `Bearer: ` prefix, e.g. "Bearer abcde12345".'
    in: header
    name: Authorization
    type: apiKey
