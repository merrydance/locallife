        found_in_rank。
      parameters:
      - description: 想吃商户
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.createWantedMerchantVoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 提交结果
          schema:
            $ref: '#/definitions/api.wantedMerchantVoteResponse'
        "400":
          description: 参数错误或内容审查未通过
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "502":
          description: 内容审查服务不可用
          schema:
            $ref: '#/definitions/api.ErrorResponse'
