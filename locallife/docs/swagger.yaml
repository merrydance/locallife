        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "503":
          description: 赔付服务不可用
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取索赔赔付确认收款参数
      tags:
      - 索赔管理
  /v1/claims/{id}/withdraw:
