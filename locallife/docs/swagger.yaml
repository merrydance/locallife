      created_at:
        type: string
      has_voted:
        type: boolean
      id:
        type: integer
      last_voted_at:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
      rank:
        type: integer
      region_id:
        type: integer
      source:
        type: string
      updated_at:
        type: string
      want_count:
        type: integer
    type: object
  api.wantedMerchantListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.wantedMerchantItemResponse'
        type: array
      page_id:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  api.wantedMerchantVoteResponse:
    properties:
      merchant_id:
        type: integer
      rank:
        type: integer
      result:
        type: string
      want_count:
        type: integer
      wanted_merchant_id:
        type: integer
    type: object
  api.webLoginConfirmRequest:
    properties:
      code:
        maxLength: 128
        minLength: 1
        type: string
      sig:
        maxLength: 128
        minLength: 1
        type: string
      ts:
        type: integer
    required:
    - code
    - sig
    - ts
    type: object
  api.webLoginConsumeRequest:
    properties:
      poll_token:
        maxLength: 256
        minLength: 1
        type: string
    required:
    - poll_token
    type: object
  api.webLoginConsumeResponse:
    properties:
      access_token:
        type: string
      access_token_expires_at:
        type: string
      refresh_token:
        type: string
      refresh_token_expires_at:
        type: string
      session_id:
        type: integer
      user:
        $ref: '#/definitions/api.userResponse'
    type: object
  api.webLoginSessionStatusResponse:
    properties:
      code:
        type: string
      confirmed_at:
        type: string
      consumed_at:
        type: string
      expires_at:
        type: string
      poll_token:
        type: string
      qr_payload:
        type: string
      status:
        type: string
    type: object
  api.wechatLoginRequest:
    properties:
      code:
        maxLength: 256
        minLength: 1
        type: string
      device_fingerprint:
        maxLength: 256
        type: string
      device_id:
        maxLength: 128
        minLength: 1
        type: string
      device_type:
        enum:
        - ios
        - android
        - miniprogram
        - h5
        type: string
    required:
    - code
    - device_id
    - device_type
    type: object
  api.wechatLoginResponse:
    properties:
      access_token:
        type: string
      access_token_expires_at:
        type: string
      refresh_token:
        type: string
      refresh_token_expires_at:
        type: string
      session_id:
        type: integer
      user:
        $ref: '#/definitions/api.userResponse'
    type: object
  api.withdrawRequest:
    properties:
      amount:
        maximum: 5000000
        minimum: 100
        type: integer
      remark:
        maxLength: 200
        type: string
    required:
    - amount
    type: object
  api.yilianyunAuthorizationResponse:
    properties:
      access_expires_at:
        type: string
      authorization_id:
        type: integer
      machine_code:
        type: string
      merchant_id:
        type: integer
      printer:
        $ref: '#/definitions/api.printerResponse'
      provider_type:
        type: string
      refresh_expires_at:
        type: string
      status:
        type: string
    type: object
  api.yilianyunAuthorizationSessionResponse:
    properties:
      authorize_url:
        type: string
      expires_at:
        type: string
      session_id:
        type: integer
      state:
        type: string
    type: object
  db.Agreement:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      published_on:
        $ref: '#/definitions/pgtype.Date'
      title:
        type: string
      type:
        type: string
      updated_at:
        type: string
      version:
        type: string
    type: object
  db.GetPopularKeywordsRow:
    properties:
      count:
        type: integer
      keyword:
        type: string
      type:
        type: string
    type: object
  db.ListSearchHistoryRow:
    properties:
      created_at:
        type: string
      id:
        type: integer
      keyword:
        type: string
      type:
        type: string
    type: object
  logic.AppliedPromotion:
    properties:
      amount:
        type: integer
      title:
        type: string
      type:
        description: merchant, voucher, delivery
        type: string
    type: object
  logic.LadderPromotion:
    properties:
      current_hit:
        type: boolean
      discount:
        type: integer
      missing_need:
        type: integer
      name:
        type: string
      rule_id:
        type: integer
      threshold:
        type: integer
    type: object
  logic.PaymentAssessment:
    properties:
      bonus_part:
        type: integer
      is_balance_payable:
        type: boolean
      payment_hint:
        type: string
      principal_part:
        type: integer
      usable_balance:
        type: integer
    type: object
  logic.SuggestedVoucher:
    properties:
      amount:
        type: integer
      id:
        type: integer
      name:
        type: string
    type: object
  logic.VoucherTrial:
    properties:
      amount:
        type: integer
      trial_payable:
        type: integer
      voucher_id:
        type: integer
      voucher_name:
        type: string
    type: object
  maps.Location:
    properties:
      lat:
        description: 纬度
        type: number
      lng:
        description: 经度
        type: number
    type: object
  maps.RouteResult:
    properties:
      distance:
        description: 距离（米）
        type: integer
      duration:
        description: 时间（秒）
        type: integer
      points:
        description: 路线坐标点串，已解压为 lat,lng
        items:
          $ref: '#/definitions/maps.Location'
        type: array
    type: object
  pgtype.Date:
    properties:
      infinityModifier:
        $ref: '#/definitions/pgtype.InfinityModifier'
      time:
        type: string
      valid:
        type: boolean
    type: object
  pgtype.InfinityModifier:
    enum:
    - 1
    - 0
    - -1
    format: int32
    type: integer
    x-enum-varnames:
    - Infinity
    - Finite
    - NegativeInfinity
host: localhost:8080
info:
  contact:
    email: support@locallife.com
    name: API Support
  description: |-
    本地生活服务平台 API 文档，包含用户、商户、订单、代取、支付等完整业务功能。

    【图片URL约定】公共展示图片字段（如 image_url / avatar_url / logo_url）应返回可直接访问的绝对 URL（通常为 CDN 地址）。
    - 公共展示素材不应再依赖客户端拼接 /uploads/... 路径。
    - 敏感材料应使用 media_asset_id + POST /v1/media/private-access 获取短期访问地址。
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: LocalLife API
  version: "1.0"
paths:
  /v1/addresses:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有地址
      produces:
      - application/json
      responses:
        "200":
          description: 地址列表
          schema:
            items:
              $ref: '#/definitions/api.userAddressResponse'
            type: array
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取用户地址列表
      tags:
      - 用户地址
    post:
      consumes:
      - application/json
      description: 为当前用户创建新的收货地址。若未提供 region_id，后端将根据经纬度自动匹配。
      parameters:
      - description: 创建地址请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.createUserAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功的地址
          schema:
            $ref: '#/definitions/api.userAddressResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建用户地址
      tags:
      - 用户地址
  /v1/addresses/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 删除成功
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 禁止访问
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 地址不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除用户地址
      tags:
      - 用户地址
    get:
      consumes:
      - application/json
      description: 根据ID获取指定地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: 地址信息
          schema:
            $ref: '#/definitions/api.userAddressResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 禁止访问
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 地址不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取用户地址
      tags:
      - 用户地址
    patch:
      consumes:
      - application/json
      description: 更新指定地址的信息。若更新了经纬度但未提供 region_id，后端将自动重新匹配。
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新地址请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.updateUserAddressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新后的地址
          schema:
            $ref: '#/definitions/api.userAddressResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 禁止访问
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 地址不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 更新用户地址
      tags:
      - 用户地址
  /v1/addresses/{id}/default:
    patch:
      consumes:
      - application/json
      description: 将指定地址设为默认收货地址
      parameters:
      - description: 地址ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 设置后的默认地址
          schema:
            $ref: '#/definitions/api.userAddressResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 禁止访问
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 地址不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 设置默认地址
      tags:
      - 用户地址
  /v1/admin/operators/{operator_id}/regions:
    get:
      parameters:
      - description: 运营商实体 ID
        in: path
        name: operator_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: '[管理] 获取运营商管理的区域列表'
      tags:
      - 管理-运营商
  /v1/admin/operators/batch/status:
    post:
      consumes:
      - application/json
      parameters:
      - description: 批量状态更新
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.batchUpdateOperatorStatusAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.batchAdminOperatorStatusResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 批量更新运营商状态'
      tags:
      - 管理-运营商
  /v1/admin/operators/region-applications:
    get:
      parameters:
      - description: 状态过滤：pending/approved/rejected，不传返回全部
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: '[管理] 列出区域扩展申请（支持状态过滤）'
      tags:
      - 管理-运营商
  /v1/admin/operators/region-applications/{id}/approve:
    post:
      parameters:
      - description: 申请ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.adminRegionExpansionApplicationResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 审批通过区域扩展申请'
      tags:
      - 管理-运营商
  /v1/admin/operators/region-applications/{id}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: 申请ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.adminRegionExpansionApplicationResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 拒绝区域扩展申请'
      tags:
      - 管理-运营商
  /v1/admin/riders:
    get:
      consumes:
      - application/json
      description: 管理员分页获取平台骑手列表，返回平台管理页使用的骑手卡片信息
      parameters:
      - default: 1
        description: 页码
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 骑手列表
          schema:
            $ref: '#/definitions/api.platformRiderListResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未登录
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取平台骑手列表
      tags:
      - 平台实体管理
  /v1/agreements:
    get:
      consumes:
      - application/json
      description: get the list of all active agreements
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.listActiveAgreementsResponse'
            type: array
      summary: List active agreements
      tags:
      - agreements
  /v1/agreements/{type}:
    get:
      consumes:
      - application/json
      description: get the content of an active agreement by its type
      parameters:
      - description: Agreement Type
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/db.Agreement'
      summary: Get active agreement by type
      tags:
      - agreements
  /v1/app/version/latest:
    get:
      description: 按平台、渠道、包名和当前版本码查询是否存在可升级版本；无更新时返回 200 和 has_update=false
      parameters:
      - description: 平台
        enum:
        - android
        in: query
        name: platform
        required: true
        type: string
      - description: 渠道
        enum:
        - merchant_app
        in: query
        name: channel
        required: true
        type: string
      - description: 包名
        in: query
        name: package_name
        required: true
        type: string
      - description: 当前版本码
        in: query
        minimum: 1
        name: version_code
        required: true
        type: integer
      - description: 当前展示版本
        in: query
        name: version_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.getLatestAppVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorMessage'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.errorMessage'
      summary: 查询 App 最新版本
      tags:
      - app-version
  /v1/auth/app-bind/code:
    post:
      description: 商户在小程序端调用，生成 6 位数字绑定码供 App 输入验证。需要 merchant 角色。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.generateAppBindCodeResponse'
        "403":
          description: 非商户角色
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 生成 App 绑定码
      tags:
      - 认证
  /v1/auth/app-bind/verify:
    post:
      consumes:
      - application/json
      description: App 端调用，使用绑定码换取 JWT token。公开端点，无需认证。
      parameters:
      - description: 绑定码验证请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.verifyAppBindCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.verifyAppBindCodeResponse'
        "400":
          description: 请求参数错误或绑定码无效
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
