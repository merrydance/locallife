      consumes:
      - application/json
      description: 获取当前用户提交的所有索赔记录
      parameters:
      - default: 1
        description: 页码
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 索赔列表
          schema:
            $ref: '#/definitions/api.userClaimsListResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取我的索赔列表
      tags:
      - 索赔管理
    post:
      consumes:
      - application/json
      description: 用户为已完成的订单提交索赔申请。系统基于行为追溯规则进行评估，决定秒赔或平台垫付。
      parameters:
      - description: 索赔信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SubmitClaimRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 索赔提交成功
          schema:
            $ref: '#/definitions/api.SubmitClaimResponse'
        "400":
          description: 参数错误或订单状态不允许索赔
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 订单不属于当前用户
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 订单不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: 该订单已有索赔记录
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 提交索赔
      tags:
      - 索赔管理
  /v1/claims/{id}:
    get:
      consumes:
      - application/json
      description: 获取指定索赔的详细信息，只能查看自己提交的索赔
      parameters:
      - description: 索赔ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 索赔详情
          schema:
            $ref: '#/definitions/api.userClaimResponse'
        "400":
          description: 无效的索赔ID
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
