  /v1/orders/calculate:
    get:
      consumes:
      - application/json
      description: |-
        根据购物车商品计算订单金额，用于下单前预览。

        **计算内容：**
        - 商品小计（基于购物车商品）
        - 代取费（外卖订单，基于实时位置或代取地址）
        - 商户营销优惠与优惠券抵扣
        - 满返运费优惠
        - 推荐优惠券、阶梯优惠和代金券试算
        - 会员余额支付能力评估

        **代取费计算方式：**
        - 传入 latitude/longitude：使用实时位置计算（浏览阶段）
        - 传入 address_id：使用已保存地址计算（下单阶段）
        - 两者都传：优先使用 address_id
      parameters:
      - description: 商户ID
        format: int64
        in: query
        minimum: 1
        name: merchant_id
        required: true
        type: integer
      - description: 订单类型
        enum:
        - takeout
        - dine_in
        - takeaway
        in: query
        name: order_type
        required: true
        type: string
      - description: 用户实时纬度（浏览阶段使用）
        in: query
        name: latitude
        type: number
      - description: 用户实时经度（浏览阶段使用）
        in: query
        name: longitude
        type: number
      - description: 代取地址ID（下单阶段使用）
        format: int64
        in: query
        name: address_id
        type: integer
      - description: 用户优惠券ID
        format: int64
        in: query
        name: user_voucher_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 计算结果
          schema:
            $ref: '#/definitions/api.orderCalculationResponse'
        "400":
          description: 参数错误/购物车为空
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 计算订单金额
      tags:
      - 订单管理
