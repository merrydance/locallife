        - ready
        - courier_accepted
        - picked
        - delivering
        - rider_delivered
        - user_delivered
        - completed
        - cancelled
        in: query
        name: status
        type: string
      - description: 订单类型筛选
        enum:
        - takeout
        - dine_in
        - takeaway
        - reservation
