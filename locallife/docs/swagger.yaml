            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: 该索赔不属于当前用户
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: 索赔不存在
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
