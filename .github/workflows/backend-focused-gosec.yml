name: backend-focused-gosec

on:
  pull_request:
    paths:
      - 'locallife/**'
      - '.github/workflows/backend-focused-gosec.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'locallife/**'
      - '.github/workflows/backend-focused-gosec.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-gosec:
    name: Focused Gosec
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: locallife
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: locallife/go.mod
          cache-dependency-path: locallife/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run focused gosec
        id: gosec
        continue-on-error: true
        env:
          GOSEC_PATHS: ./worker ./media ./wechat ./util/...
        run: |
          set +e
          mkdir -p ../artifacts
          "$HOME/go/bin/gosec" -fmt=json -out ../artifacts/focused-gosec-report.json $GOSEC_PATHS 2>&1 | tee ../artifacts/focused-gosec.log
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import pathlib

          report_path = pathlib.Path("../artifacts/focused-gosec-report.json")
          if not report_path.exists():
              print("issue_count=unknown")
          else:
              try:
                  data = json.loads(report_path.read_text())
                  print(f"issue_count={len(data.get('Issues', []))}")
              except Exception:
                  print("issue_count=unknown")
          PY
          exit "$status"

      - name: Summarize focused gosec
        if: always()
        env:
          GOSEC_EXIT_CODE: ${{ steps.gosec.outputs.exit_code }}
          GOSEC_ISSUE_COUNT: ${{ steps.gosec.outputs.issue_count }}
        run: |
          echo "## Focused gosec" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Paths: ./worker ./media ./wechat ./util/..." >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit code: ${GOSEC_EXIT_CODE:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Issue count: ${GOSEC_ISSUE_COUNT:-unknown}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${GOSEC_EXIT_CODE:-unknown}" = "0" ]; then
            echo "- Result: no focused gosec findings" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: focused gosec reported findings or scan errors; this workflow is intentionally non-blocking" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Focused gosec::Focused gosec returned exit code ${GOSEC_EXIT_CODE:-unknown} with ${GOSEC_ISSUE_COUNT:-unknown} issue(s). See artifact focused-gosec-report."
          fi

      - name: Upload focused gosec artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-gosec-report
          path: |
            artifacts/focused-gosec-report.json
            artifacts/focused-gosec.log
          if-no-files-found: warn