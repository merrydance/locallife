name: weapp-quality

on:
  pull_request:
    paths:
      - 'weapp/**'
      - '.github/workflows/weapp-quality.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'weapp/**'
      - '.github/workflows/weapp-quality.yml'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: weapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality:check
