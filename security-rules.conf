# 安全防护规则
# 适用于所有站点

# 1. 路径遍历攻击防护
if ($request_uri ~* "\.\.") {
    return 403;
}

# 2. SQL 注入基础防护（检测常见 SQL 关键词组合）
if ($query_string ~* "(union\s+select|select\s+from|insert\s+into|delete\s+from|drop\s+table|update\s+set)") {
    return 403;
}

# 3. 恶意 User-Agent 拦截（扫描工具、恶意爬虫）
# 注意：curl/wget 保留用于调试，生产环境可按需开启
if ($http_user_agent ~* (nikto|sqlmap|nmap|zgrab|dirbuster|hydra|masscan|metasploit|scrapy)) {
    return 403;
}

# 4. 空 User-Agent 拦截（可选，某些爬虫会这样）
if ($http_user_agent = "") {
    return 403;
}

# 5. 隐藏敏感文件和目录
location ~* /\.(git|svn|env|htaccess|htpasswd|DS_Store) {
    deny all;
    return 444;
}

# 6. 拦截常见后台路径扫描
location ~* /(wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|phpMyAdmin|myadmin|pma|admin|administrator|config|backup|sql|database|db|_admin|manage|manager|console|shell|cgi-bin) {
    deny all;
    return 444;
}

# 7. PHP 文件执行防护（非 PHP 项目必备）
location ~* \.php($|/) {
    deny all;
    return 444;
}

# 8. 限制敏感文件扩展名访问
location ~* \.(ext)$(sql|bak|old|log|ini|conf|sh|bash|zsh|py|rb|pl|cgi|exe|dll|asp|aspx|jsp)$ {
    deny all;
    return 444;
}

# 9. 禁止访问隐藏文件（以.开头）
location ~* /\. {
    deny all;
    return 444;
}
